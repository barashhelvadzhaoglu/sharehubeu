baseURL = "https://share-hub-eu.online/"
defaultContentLanguage = "tr"
defaultContentLanguageInSubdir = true
enableRobotsTXT = true
paginate = 10
theme = "blowfish"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[languages]
  [languages.tr]
    contentDir = "content/tr"
    languageCode = "tr"
    languageName = "Türkçe"
    weight = 1
    [languages.tr.params]
      displayName = "TR"

  [languages.en]
    contentDir = "content/en"
    languageCode = "en"
    languageName = "English"
    weight = 2
    [languages.en.params]
      displayName = "EN"

  [languages.de]
    contentDir = "content/de"
    languageCode = "de"
    languageName = "Deutsch"
    weight = 3
    [languages.de.params]
      displayName = "DE"
